version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boxmeout
      POSTGRES_PASSWORD: boxmeout
      POSTGRES_DB: boxmeout
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boxmeout']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    build: ./indexer
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: ./indexer/.env
    ports:
      - '3002:3002'
    volumes:
      - indexer_data:/app/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      indexer:
        condition: service_started
    env_file: ./backend/.env
    ports:
      - '3001:3001'

  indexer:
    build: ./indexer
    restart: unless-stopped
    depends_on:
      - backend
    env_file: ./backend/.env
    environment:
      - FACTORY_CONTRACT_ADDRESS=${FACTORY_CONTRACT_ADDRESS}
      - SOROBAN_RPC_URL=${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
    volumes:
      - indexer_data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: ./frontend/.env
    ports:
      - '3000:3000'

  postgres-test:
    image: postgres:15-alpine
    profiles: [test]
    environment:
      POSTGRES_USER: boxmeout
      POSTGRES_PASSWORD: boxmeout
      POSTGRES_DB: boxmeout_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
  indexer_data:
